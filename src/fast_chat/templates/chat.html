<html><head>
<meta charset="UTF-8">
<title>Fast Chat</title>
<link rel="stylesheet" href="/static/css/chat.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="sidebar">
    <div class="user-item" id="my_account" data-user-id="{{current_user.id}}">
      <div class="account-info">
        <div class="user-avatar" title="{{current_user.full_name}}">{{current_user.full_name[0] | upper}}</div>
        <span class="user-name">Hello, <b>{{current_user.full_name}}!</b></span>
      </div>
      <button class="logout-btn" id="logout-button" title="Выйти из аккаунта">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="dm-header">
      <span class="dm-header-title">Личные сообщения</span>
      <button class="dm-add-btn" id="dm-add-btn" title="Найти пользователя">+</button>
    </div>

    <div class="search-modal-overlay" id="search-modal-overlay">
      <div class="search-modal">
        <div class="search-modal-title">Найти пользователя</div>
        <input type="text" class="search-input" id="search-input" placeholder="Введите имя..." autocomplete="off">
        <div class="search-modal-results" id="search-modal-results"></div>
      </div>
    </div>

    <div class="users-list"></div>
  </div>

  <div id="toaster"></div>

  <div class="main-chat">

    <div class="chat-header" id="chat-header" style="display:none;">
      <h2>Чат с пользователем <span class="current-chat-name"></span></h2>
      <button class="close-chat-btn" id="close-chat-btn" title="Закрыть чат">✕</button>
    </div>


    <div class="no-chat-placeholder" id="no-chat-placeholder">
      <div class="placeholder-icon">💬</div>
      <div class="placeholder-title">Похоже, вы все обсудили</div>
      <div class="placeholder-subtitle">У вас нет непрочитанных сообщений</div>
    </div>

    <div class="chat-messages" id="chat-messages" style="display:none;"></div>

      <div class="chat-input-container" id="chat-input" style="display:none;">
      <div class="input-body">
        <textarea class="chat-input" id="chat-textarea" placeholder="Напишите сообщение ..."></textarea>
      </div>
      <div class="input-toolbar">

        <button class="toolbar-btn" data-action="bold" title="Жирный (Ctrl+B)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
          </svg>
        </button>

        <button class="toolbar-btn" data-action="italic" title="Курсив (Ctrl+I)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/>
          </svg>
        </button>

        <button class="toolbar-btn" data-action="strike" title="Зачеркнутый">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><path d="M16 6C16 6 14.5 4 12 4c-2.5 0-4 1.5-4 3 0 1.2.7 2 2 2.5"/><path d="M8 18c0 0 1.5 2 4 2 2.5 0 4-1.5 4-3 0-1.2-.7-2-2-2.5"/>
          </svg>
        </button>
        <div class="toolbar-sep"></div>

        <button class="toolbar-btn" data-action="code" title="Инлайн-код">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>

        <button class="toolbar-btn" data-action="codeblock" title="Блок кода">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/><line x1="9" y1="3" x2="15" y2="21"/>
          </svg>
        </button>
        <div class="toolbar-sep"></div>

        <button class="toolbar-btn" data-action="quote" title="Цитата">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
          </svg>
        </button>

        <button class="toolbar-btn" data-action="link" title="Ссылка">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <div class="toolbar-sep"></div>

        <div class="emoji-picker-wrapper">
          <button class="toolbar-btn" id="emoji-toggle" title="Emoji">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </button>
          <div class="emoji-picker-popup" id="emoji-picker">
            <input class="emoji-search" id="emoji-search" placeholder="Search emoji..." autocomplete="off">
            <div class="emoji-body" id="emoji-body"></div>
          </div>
        </div>

        <button class="send-toolbar-btn" id="submit" title="Отправить (Enter)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

<script src="/static/js/common.js"></script>
<script src="/static/js/emoji-data.js"></script>
<script src="/static/js/chat.js"></script>
</body></html>
